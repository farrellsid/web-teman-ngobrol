name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      - name: Type + content schema check
        run: npx astro check
      - name: Build (content gate)
        run: npm run build
      - name: Internal link check (offline)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --include-fragments ./dist
          fail: true
