# Pages CMS config — https://pagescms.org
#
# IMPORTANT: Pages CMS does NOT validate against the Zod schema in src/content.config.ts.
# `astro build` is the only validator. Keep this file in lockstep with that schema:
#   - `required: true` here  <-> non-.optional() in Zod (omitting a required field breaks the build)
#   - date `options.format` ISO (yyyy-MM-dd) <-> z.coerce.date()
#   - a field named `body` is the Markdown body, NOT frontmatter (absent from the Zod object)

media:
  input: public/uploads      # editor uploads are committed here
  output: /uploads           # path written into frontmatter (public/ is the web root)

content:
  - name: articles
    label: Articles
    type: collection
    path: src/content/articles
    filename: '{year}-{month}-{day}-{fields.title}.md'
    view:
      fields: [title, author, pubDate, draft]
      primary: title
      sort: [pubDate, title]
      default: { sort: pubDate, order: desc }
    fields:
      - { name: title,       label: Title,        type: string,   required: true }
      - { name: description, label: Description,   type: text }
      - { name: author,      label: Author,       type: string,   required: true }
      - { name: pubDate,     label: Publish date, type: date,     required: true, options: { format: yyyy-MM-dd } }
      - { name: updatedDate, label: Updated date, type: date,     options: { format: yyyy-MM-dd } }
      - { name: heroImage,   label: Hero image,   type: image }
      - { name: draft,       label: Draft,        type: boolean,  default: false }
      - { name: tags,        label: Tags,         type: string,   list: true }
      - { name: body,        label: Body,         type: rich-text }

  - name: guides
    label: Country guides
    type: collection
    path: src/content/guides
    filename: '{fields.country}.md'
    view:
      fields: [country, flagEmoji, pubDate, draft]
      primary: country
    fields:
      - { name: country,   label: Country, type: string,  required: true }
      - { name: flagEmoji, label: Flag,    type: string,  required: true }
      - { name: summary,   label: Summary, type: text,    required: true }
      - { name: pubDate,   label: Date,    type: date,    required: true, options: { format: yyyy-MM-dd } }
      - { name: draft,     label: Draft,   type: boolean, default: false }
      - { name: body,      label: Content, type: rich-text }

  - name: events
    label: Events
    type: collection
    path: src/content/events
    view:
      fields: [title, eventDate, location, draft]
      primary: title
      sort: [eventDate, title]
      default: { sort: eventDate, order: desc }
    fields:
      - { name: title,     label: Title,      type: string,  required: true }
      - { name: eventDate, label: Event date, type: date,    required: true, options: { format: yyyy-MM-dd } }
      - { name: location,  label: Location,   type: string }
      - { name: draft,     label: Draft,      type: boolean, default: false }
      - { name: body,      label: Details,    type: rich-text }

  - name: testimonials
    label: Testimonials
    type: collection
    path: src/content/testimonials
    view:
      fields: [name, cohort]
      primary: name
    fields:
      - { name: name,   label: Name,   type: string, required: true }
      - { name: cohort, label: Cohort, type: string }
      - { name: quote,  label: Quote,  type: text,   required: true }
